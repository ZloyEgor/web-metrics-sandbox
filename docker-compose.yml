services:
  backend:
    build:
      context: ./metrics-collector
    image: web-metrics-sandbox/metrics-backend:local
    container_name: metrics-backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./sandbox-app
      args:
        VITE_API_URL: "http://localhost:4000"
    image: web-metrics-sandbox/sandbox-frontend:local
    container_name: sandbox-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
