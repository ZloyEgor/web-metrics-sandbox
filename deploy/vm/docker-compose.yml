# Stack deployed on the Yandex Compute VM.
# Caddy terminates TLS using Let's Encrypt for $BACKEND_HOSTNAME and
# reverse-proxies to the metrics-backend container on the internal
# docker network.
services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BACKEND_HOSTNAME: ${BACKEND_HOSTNAME:?set BACKEND_HOSTNAME, e.g. backend.111-88-250-26.sslip.io}
    depends_on:
      - backend

  backend:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE to cr.yandex/<registry-id>/metrics-backend:<tag>}
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PORT: "8080"

volumes:
  caddy_data:
  caddy_config:
