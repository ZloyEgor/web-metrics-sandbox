name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            sandbox-app/package-lock.json
            metrics-collector/package-lock.json

      - name: Frontend - install
        working-directory: sandbox-app
        run: npm ci

      - name: Frontend - lint
        working-directory: sandbox-app
        run: npm run lint
        continue-on-error: true

      - name: Frontend - build
        working-directory: sandbox-app
        run: npm run build

      - name: Backend - install
        working-directory: metrics-collector
        run: npm ci

      - name: Backend - syntax check
        working-directory: metrics-collector
        run: node --check server.js

  deploy-backend:
    name: Deploy backend to Compute VM
    runs-on: ubuntu-latest
    needs: lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      REGISTRY: cr.yandex/${{ secrets.YC_REGISTRY_ID }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./metrics-collector
          push: true
          tags: |
            ${{ env.REGISTRY }}/metrics-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/metrics-backend:latest
          cache-from: type=gha,scope=metrics-backend
          cache-to: type=gha,scope=metrics-backend,mode=max

      - name: Sync compose stack to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: deploy
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: deploy/vm/docker-compose.yml,deploy/vm/Caddyfile
          target: /home/deploy/stack/
          strip_components: 2

      - name: Deploy backend on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: deploy
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: REGISTRY,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /home/deploy/stack
            sudo systemctl start yc-cr-login.service
            cat > .env <<EOF
            BACKEND_HOSTNAME=${{ secrets.BACKEND_HOSTNAME }}
            BACKEND_IMAGE=${REGISTRY}/metrics-backend:${IMAGE_TAG}
            EOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps

  deploy-frontend:
    name: Deploy frontend to Serverless Container
    runs-on: ubuntu-latest
    needs: lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      REGISTRY: cr.yandex/${{ secrets.YC_REGISTRY_ID }}
      IMAGE_TAG: ${{ github.sha }}
      BACKEND_URL: https://${{ secrets.BACKEND_HOSTNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure yc CLI
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          printf '%s' "$YC_SA_JSON_CREDENTIALS" > "$HOME/yc-key.json"
          yc config profile create gh-actions
          yc config set service-account-key "$HOME/yc-key.json"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-app
          push: true
          build-args: |
            VITE_API_URL=${{ env.BACKEND_URL }}
          tags: |
            ${{ env.REGISTRY }}/sandbox-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/sandbox-frontend:latest
          cache-from: type=gha,scope=sandbox-frontend
          cache-to: type=gha,scope=sandbox-frontend,mode=max

      - name: Deploy frontend serverless container revision
        env:
          SC_INVOKER_SA_ID: ${{ secrets.YC_SC_INVOKER_SA_ID }}
        run: |
          yc serverless container revisions deploy \
            --container-name sandbox-frontend \
            --image "${REGISTRY}/sandbox-frontend:${IMAGE_TAG}" \
            --memory 512MB \
            --cores 1 \
            --execution-timeout 30s \
            --service-account-id "$SC_INVOKER_SA_ID"

      - name: Summary
        run: |
          frontend_url=$(yc serverless container get --name sandbox-frontend --format json | jq -r .url)
          {
            echo "## Deployment"
            echo ""
            echo "- Frontend: $frontend_url"
            echo "- Backend:  $BACKEND_URL"
            echo "- Image tag: \`${IMAGE_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"
